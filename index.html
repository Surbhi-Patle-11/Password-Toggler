<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>password-toggler</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="form-wrapper">
        
        <div class="form-box">
             <h2>Login Form</h2>
            <input type="text" placeholder="username" class="input1" >
           <div class="eye-input"> <input type="password" placeholder="password" id="pswrd" class="input1">
             <img src="./images/hidden-img.png" class="eye-icon" id="eye" onclick="eyeviewhandle()"></div>
      
              <button type="reset">login</button> </div>
           
       
    </div>

    <script>

        function eyeviewhandle(){
        const inputpasswrd =document.getElementById("pswrd");
        const eyeimg = document.getElementById("eye");

       
       

            if(inputpasswrd.type === "password"){
                inputpasswrd.type = "text";
                eyeimg.src ="./images/view-img.png"
                
            }

            else{
                inputpasswrd.type ="password";
                eyeimg.src ="./images/hidden-img.png"
            }

        }
    </script>
    
</body>
</html>
